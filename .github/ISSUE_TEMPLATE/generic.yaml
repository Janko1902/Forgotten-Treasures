name: Bug report
description: Report some misbehaviour in the mod
labels: [ bug ]
type: bug
body:
 - type: input
   id: description
   attributes:
      label: Description
      description: Briefly explain the context or problem.
   validations:
      required: true
 - type: input
   id: goal
   attributes:
      label: Goal
      description: Define what should be accomplished.
   validations:
      required: true
 - type: input
   id: reasoning
   attributes:
     label: Why this way
     description: Optionaly explain why this way or method is better/more suitable than others.
   validations:
     required: true

     



